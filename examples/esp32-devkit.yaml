# ESP32 DevKit compatible release preset.
#
# One firmware image covers TTL, RS232 and RS485 wiring:
# - TTL / RS232: use TX/RX/GND only; leave GPIO4 unconnected.
# - RS485: use the same TX/RX plus GPIO4 for DE/RE direction control.
#
# The inverter protocol is selected by EyeBond Local at runtime. This YAML only
# fixes the board, pins and physical serial link.

esphome:
  name: eybond-bridge

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Eybond-Bridge Setup"

captive_portal:

ota:
  - platform: esphome

external_components:
  - source: github://groove-max/esp-eybond-collector
    components: [eybond_collector]

uart:
  id: inverter_uart
  tx_pin: GPIO17  # -> inverter RX / RS485 DI / MAX3232 input
  rx_pin: GPIO16  # <- inverter TX / RS485 RO / MAX3232 output
  baud_rate: 9600 # SMG/Modbus default; switch to 2400 for PI30/Voltronic
  data_bits: 8
  parity: NONE
  stop_bits: 1

eybond_collector:
  id: bridge
  uart_id: inverter_uart
  flow_control_pin: GPIO4  # -> RS485 DE+RE; leave unconnected for TTL/RS232
  status_led_pin: GPIO2    # built-in LED on many ESP-WROOM-32 DevKit boards; do not add external pulls
  # pn: V00000200000000001  # optional synthetic PN; default is derived from MAC
  # server_host: 192.0.2.10 # optional static HA address; discovery is the default

select:
  - platform: eybond_collector
    eybond_collector_id: bridge
    name: "Inverter UART baud rate"
    restore_value: true

api:
