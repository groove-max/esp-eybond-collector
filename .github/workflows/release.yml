name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ESPHOME_VERSION: "2025.7.5"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ESPHome
        run: python -m pip install "esphome==${ESPHOME_VERSION}" pyyaml
      - name: Host tests
        run: make -C host_tests test
      - name: Build web release
        run: python tools/build_web_release.py --compile --local-source --version "${GITHUB_REF_NAME}"
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/web-release/web/firmware/*.bin
            dist/web-release/web/manifest-*.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/web-release/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
