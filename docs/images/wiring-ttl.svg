<text x="120.0" y="109" text-anchor="middle" font-size="11" fill="#6a7682">ESP8266 / ESP32 / BK72xx</text>
<circle cx="200" cy="128" r="4" fill="#1d2b36"/>
<text x="188" y="132" text-anchor="end" font-size="13" fill="#1d2b36" font-family="monospace">TX</text>
