<text x="410.0" y="244" text-anchor="middle" font-size="12" fill="#c9302c">⚠ 5 V TTL inverter: add a level shifter / divider</text><text x="410.0" y="261" text-anchor="middle" font-size="12" fill="#c9302c">on the ESP RX (3.3 V) line</text>
  <text x="410.0" y="362" text-anchor="middle" font-size="12" fill="#6a7682">Cross over TX/RX. Share a common ground. PI30/Voltronic TTL is usually 2400 8N1.</text>
