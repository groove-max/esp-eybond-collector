<text x="188" y="162" text-anchor="end" font-size="13" fill="#1d2b36" font-family="monospace">RX</text>
<circle cx="200" cy="188" r="4" fill="#1d2b36"/>
<text x="188" y="192" text-anchor="end" font-size="13" fill="#1d2b36" font-family="monospace">GND</text>
